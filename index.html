*{box-sizing:border-box}

.staticrypt-page{width:100%;max-width:440px;padding:24px;margin:auto;box-sizing:border-box}
.staticrypt-form{position:relative;z-index:1;background:#fff;width:100%;max-width:420px;margin:0 auto;

.brandmark{display:flex;align-items:center;gap:9px;margin-bottom:24px}
.brandmark .logo{font-size:23px;font-weight:700;letter-spacing:-.6px;color:#1c3662}
.brandmark .dot{width:9px;height:9px;border-radius:50%;background:#eb4d7a;display:inline-block}
.brandmark .tag{margin-left:auto;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:#eb4d7a;border:1px solid #f6d3df;background:#fdeef3;border-radius:50px;padding:4px 11px}
.staticrypt-instructions{margin:0 0 22px}
.staticrypt-title{font-size:24px;font-weight:600;letter-spacing:-.5px;color:#1c3662;margin:0 0 8px}
.staticrypt-instructions p:last-child{font-size:14.5px;color:#5d7191;margin:0;line-height:1.45}
.staticrypt-hr{display:none}
.staticrypt-password-container{position:relative;width:100%;margin:0 0 16px;background:#f5f9ff;
  border:1px solid #d8e3f5;border-radius:5px;box-sizing:border-box;transition:.15s}
.staticrypt-form input[type="password"],.staticrypt-form input[type="text"]{background:transparent;border:0;
  box-sizing:border-box;font-family:"Funnel Sans",Arial,sans-serif;font-size:15.5px;color:#1c3662;outline:0;
  padding:15px 44px 15px 16px;width:100%;border-radius:5px}
.staticrypt-password-container:focus-within{border-color:#eb4d7a;box-shadow:0 0 0 3px rgba(235,77,122,.15)}
.staticrypt-toggle-password-visibility{cursor:pointer;height:20px;opacity:.55;padding:13px;position:absolute;

.staticrypt-form .staticrypt-decrypt-button{text-transform:none;font-family:"Funnel Sans",Arial,sans-serif;
  font-weight:600;outline:0;background:#eb4d7a;width:100%;border:0;padding:15px;color:#fff;font-size:16px;
  cursor:pointer;border-radius:50px;letter-spacing:.2px;transition:filter .15s}
.staticrypt-form .staticrypt-decrypt-button:hover,.staticrypt-form .staticrypt-decrypt-button:active,
.staticrypt-form .staticrypt-decrypt-button:focus{background:#eb4d7a;filter:brightness(93%)}
label.staticrypt-remember{display:flex;align-items:center;margin:0 0 16px;font-size:13.5px;color:#5d7191;
  font-family:"Funnel Sans",Arial,sans-serif}
.staticrypt-remember input[type="checkbox"]{transform:scale(1.3);margin-right:12px;accent-color:#eb4d7a}
.hidden{display:none !important}
.staticrypt-spinner-container{height:100%;display:flex;align-items:center;justify-content:center;

.staticrypt-spinner{display:inline-block;width:2rem;height:2rem;border:.25em solid rgba(255,255,255,.4);

@keyframes spinner-border{100%{transform:rotate(360deg)}}
.staticrypt-foot{margin-top:22px;padding-top:16px;border-top:1px solid #e4ecf7;font-size:12px;color:#5d7191;line-height:1.45}
@media screen and (-webkit-min-device-pixel-ratio:0){.staticrypt-form input[type="password"],
.staticrypt-form input[type="text"]{font-size:16px}}
